name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changes since last release
        id: changes
        run: |
          PREV_TAG=$(git describe --abbrev=0 --tags HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag — including core catalog in first release"
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git log "${PREV_TAG}..HEAD" --oneline -- . | grep -q .; then
            echo "Changes detected since ${PREV_TAG}"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes since ${PREV_TAG} — skipping"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Get app token
        if: steps.changes.outputs.changed == 'true'
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.CCC_BOT_APP_ID }}
          private-key: ${{ secrets.CCC_BOT_PRIVATE_KEY }}
          owner: common-cloud-controls
          repositories: website-new

      - name: Release and publish
        if: steps.changes.outputs.changed == 'true'
        uses: common-cloud-controls/delivery-toolkit@main
        with:
          type: all
          path: core/ccc
          title: Core
          token: ${{ steps.app-token.outputs.token }}
